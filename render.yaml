databases:
  - name: cloudhub-db
    databaseName: cloudhub_hr
    user: cloudhub
    plan: free

services:
  - type: web
    name: cloudhub-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && python seed.py && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cloudhub-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: cloudhub-frontend
    env: node
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: cloudhub-backend
          property: host
          format: https://{host}
